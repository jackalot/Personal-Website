<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linktree - Social Links</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>My Links</h1>
    <div class="links">
      <a class="link-button github" href="https://github.com/jackalot" target="_blank" rel="noopener noreferrer">
        <img class="platform-icon" src="https://cdn.jsdelivr.net/npm/simple-icons@v8/icons/github.svg" alt="GitHub logo" loading="lazy"> GitHub
      </a>
      <a class="link-button linkedin" href="https://www.linkedin.com/in/christopher-gonzalez-a10144187/" target="_blank" rel="noopener noreferrer">
        <img class="platform-icon" src="https://cdn.jsdelivr.net/npm/simple-icons@v8/icons/linkedin.svg" alt="LinkedIn logo" loading="lazy"> LinkedIn
      </a>
    </div>
    <p class="subtext">Click any profile to open in a new tab.</p>
  </div>
</body>
</html>
